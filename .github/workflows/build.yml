# .github/workflows/build.yml
name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++-11, g++-12, g++-13, clang++-14, clang++-15, clang++-16, clang++-17]
        standard: [20, 23]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install compilers
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-11 g++-12 g++-13 clang-14 clang-15 clang-16 clang-17 clang-18
    
    - name: Compile test with ${{ matrix.compiler }} (C++${{ matrix.standard }})
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
          -DCMAKE_CXX_STANDARD=${{ matrix.standard }} \
          -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wpedantic -Werror -I../include"
        make
    
    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure