# .github/workflows/static-analysis.yml
name: Static Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-tidy \
          cppcheck \
          clang-format-15 \
          valgrind
    
    - name: Run clang-tidy
      run: |
        find include -name "*.hpp" | xargs -I {} clang-tidy {} -- -std=c++20 -Iinclude
    
    - name: Run cppcheck
      run: |
        cppcheck --enable=all \
          --suppress=missingIncludeSystem \
          --error-exitcode=1 \
          --std=c++20 \
          -Iinclude \
          include/
    
    - name: Check formatting with clang-format
      run: |
        find include -name "*.hpp" | xargs clang-format-15 --dry-run --Werror
    
    - name: Run tests with Valgrind
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Debug
        cmake --build build
        valgrind --leak-check=full --error-exitcode=1 ./build/tests/test_processImage/test_processImage